name: Build & Deploy (GHCR)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build_and_deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set vars
        id: vars
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER}"

          IMAGE_API="ghcr.io/${OWNER}/toptry-ai"
          IMAGE_WEB="ghcr.io/${OWNER}/toptry-web"

          SHORT_SHA="${GITHUB_SHA::7}"

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAG="prod"

            API_CONTAINER="toptry-ai-prod"
            API_ENV_FILE="/root/toptry-ai-prod.env"
            API_PORT_BIND="127.0.0.1:8080:5174"
            API_ALIAS="ai"

            WEB_CONTAINER="toptry-web-prod"
            WEB_PORT_BIND="127.0.0.1:8082:80"
          else
            TAG="staging"

            API_CONTAINER="toptry-ai-staging"
            API_ENV_FILE="/opt/toptry-ai/.env.staging"
            API_PORT_BIND="127.0.0.1:8081:5174"
            API_ALIAS="ai-staging"

            WEB_CONTAINER="toptry-web-staging"
            WEB_PORT_BIND="127.0.0.1:8083:80"
          fi

          echo "image_api=${IMAGE_API}" >> $GITHUB_OUTPUT
          echo "image_web=${IMAGE_WEB}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "sha_tag=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

          echo "api_container=${API_CONTAINER}" >> $GITHUB_OUTPUT
          echo "api_env_file=${API_ENV_FILE}" >> $GITHUB_OUTPUT
          echo "api_port_bind=${API_PORT_BIND}" >> $GITHUB_OUTPUT
          echo "api_alias=${API_ALIAS}" >> $GITHUB_OUTPUT

          echo "web_container=${WEB_CONTAINER}" >> $GITHUB_OUTPUT
          echo "web_port_bind=${WEB_PORT_BIND}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR (push)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- API image ---
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image_api }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image_api }}:${{ steps.vars.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy AI gateway on DigitalOcean
        if: github.ref == 'refs/heads/main'
        env:
          IMAGE_API: ${{ steps.vars.outputs.image_api }}
          TAG: ${{ steps.vars.outputs.tag }}
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USER }}
          PORT: ${{ secrets.SSH_PORT }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          BOURBAKI_OPENAI_API_KEY: ${{ secrets.BOURBAKI_OPENAI_API_KEY }}
          BOURBAKI_VISUALIZATION_SECRET: ${{ secrets.BOURBAKI_VISUALIZATION_SECRET }}
        run: |
          set -euo pipefail

          test -n "$BOURBAKI_OPENAI_API_KEY"
          test -n "$BOURBAKI_VISUALIZATION_SECRET"

          OPENAI_KEY_B64="$(printf '%s' "$BOURBAKI_OPENAI_API_KEY" | base64 | tr -d '\n')"
          BOURBAKI_SECRET_B64="$(printf '%s' "$BOURBAKI_VISUALIZATION_SECRET" | base64 | tr -d '\n')"

          mkdir -p ~/.ssh
          printf "%s" "$SSH_KEY" > ~/.ssh/id_ed25519
          echo >> ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_ed25519 -p "$PORT" "$USER@$HOST" \
            "IMAGE_API='$IMAGE_API' TAG='$TAG' GHCR_USER='$GHCR_USER' GHCR_TOKEN='$GHCR_TOKEN' OPENAI_KEY_B64='$OPENAI_KEY_B64' BOURBAKI_SECRET_B64='$BOURBAKI_SECRET_B64' bash -s" <<'REMOTE'
          set -euo pipefail

          CONTAINER="toptry-ai-gateway"
          PORT_BIND="127.0.0.1:8090:5174"
          ENV_FILE="$(mktemp /tmp/toptry-ai-gateway.env.XXXXXX)"
          BODY_FILE="$(mktemp /tmp/toptry-ai-gateway-smoke.XXXXXX)"
          REPLACED=0

          cleanup() {
            rm -f "$ENV_FILE" "${ENV_FILE}.next" "$BODY_FILE"
          }

          rollback() {
            if [ "$REPLACED" != "1" ]; then
              return
            fi

            echo "AI gateway smoke check failed; restoring previous image"
            docker rm -f "$CONTAINER" >/dev/null 2>&1 || true
            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              --network "$NETWORK" \
              --env-file "$ENV_FILE" \
              -e AI_GATEWAY_ROLE=gateway \
              -e BOURBAKI_FABRIC_CLASSIFIER_MODEL=gemini-2.5-flash \
              -p "$PORT_BIND" \
              "$PREVIOUS_IMAGE" >/dev/null
          }

          on_error() {
            status=$?
            rollback || true
            cleanup
            exit "$status"
          }

          trap on_error ERR
          trap cleanup EXIT

          docker inspect "$CONTAINER" >/dev/null
          PREVIOUS_IMAGE="$(docker inspect "$CONTAINER" --format '{{.Config.Image}}')"
          NETWORK="$(docker inspect "$CONTAINER" --format '{{range $name, $_ := .NetworkSettings.Networks}}{{printf "%s" $name}}{{end}}')"
          NETWORK="${NETWORK:-toptry-ai_default}"
          docker inspect "$CONTAINER" --format '{{range .Config.Env}}{{println .}}{{end}}' > "$ENV_FILE"

          OPENAI_API_KEY="$(printf '%s' "$OPENAI_KEY_B64" | base64 -d)"
          BOURBAKI_VISUALIZATION_SECRET="$(printf '%s' "$BOURBAKI_SECRET_B64" | base64 -d)"

          test -n "$OPENAI_API_KEY"
          test -n "$BOURBAKI_VISUALIZATION_SECRET"

          grep -vE '^(OPENAI_API_KEY|BOURBAKI_VISUALIZATION_SECRET)=' "$ENV_FILE" > "${ENV_FILE}.next" || true
          printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY" >> "${ENV_FILE}.next"
          printf 'BOURBAKI_VISUALIZATION_SECRET=%s\n' "$BOURBAKI_VISUALIZATION_SECRET" >> "${ENV_FILE}.next"
          mv "${ENV_FILE}.next" "$ENV_FILE"

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker pull "$IMAGE_API:$TAG"

          docker rm -f "$CONTAINER" >/dev/null
          docker run -d \
            --name "$CONTAINER" \
            --restart unless-stopped \
            --network "$NETWORK" \
            --env-file "$ENV_FILE" \
            -e AI_GATEWAY_ROLE=gateway \
            -e BOURBAKI_FABRIC_CLASSIFIER_MODEL=gemini-2.5-flash \
            -p "$PORT_BIND" \
            "$IMAGE_API:$TAG" >/dev/null
          REPLACED=1

          sleep 2

          docker exec "$CONTAINER" sh -lc '
            test -n "$OPENAI_API_KEY"
            test -n "$BOURBAKI_VISUALIZATION_SECRET"
            test "$AI_GATEWAY_ROLE" = "gateway"
          '

          SECRET="$(sed -n 's/^AI_GATEWAY_SECRET=//p' "$ENV_FILE" | head -n 1)"
          if [ -z "$SECRET" ]; then
            SECRET="$(sed -n 's/^PROXY_SHARED_SECRET=//p' "$ENV_FILE" | head -n 1)"
          fi
          test -n "$SECRET"

          CODE="$(curl -sS -o "$BODY_FILE" -w '%{http_code}' \
            --connect-timeout 10 --max-time 25 \
            -X POST http://127.0.0.1:8090/internal/ai/wardrobe/extract \
            -H 'content-type: application/json' \
            -H "x-toptry-internal-secret: $SECRET" \
            --data '{}')"

          test "$CODE" = "400"
          grep -q 'photoDataUrl is required' "$BODY_FILE"

          NEVERENDING_NOVEL_CODE="$(curl -sS -o "$BODY_FILE" -w '%{http_code}' \
            --connect-timeout 10 --max-time 25 \
            -X POST http://127.0.0.1:8090/internal/ai/neverending-novel/story-architect \
            -H 'content-type: application/json' \
            -H "x-toptry-internal-secret: $SECRET" \
            --data '{}')"

          test "$NEVERENDING_NOVEL_CODE" = "400"
          grep -q 'NEVERENDING_NOVEL_ARCHITECT_INVALID_INPUT' "$BODY_FILE"

          BOURBAKI_CODE="$(curl -sS -o "$BODY_FILE" -w '%{http_code}' \
            --connect-timeout 10 --max-time 25 \
            -X POST http://127.0.0.1:8090/internal/ai/bourbaki/render-v2 \
            -H 'content-type: application/json' \
            -H "x-bourbaki-visualization-secret: $BOURBAKI_VISUALIZATION_SECRET" \
            --data '{}')"

          test "$BOURBAKI_CODE" = "400" || test "$BOURBAKI_CODE" = "422"

          echo "AI gateway deployed; wardrobe, Neverending Novel and Bourbaki endpoints smoke-tested"
          REMOTE


      # --- WEB image ---
      - name: Build & push WEB image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ${{ steps.vars.outputs.image_web }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image_web }}:${{ steps.vars.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on server (pull + restart)
        run: |
          IMAGE_API="${{ steps.vars.outputs.image_api }}"
          IMAGE_WEB="${{ steps.vars.outputs.image_web }}"
          TAG="${{ steps.vars.outputs.tag }}"

          API_CONTAINER="${{ steps.vars.outputs.api_container }}"
          API_ENV_FILE="${{ steps.vars.outputs.api_env_file }}"
          API_PORT_BIND="${{ steps.vars.outputs.api_port_bind }}"
          API_ALIAS="${{ steps.vars.outputs.api_alias }}"

          WEB_CONTAINER="${{ steps.vars.outputs.web_container }}"
          WEB_PORT_BIND="${{ steps.vars.outputs.web_port_bind }}"

          HOST="$(printf "%s" "${{ secrets.TOPTRY_PROD_HOST }}" | tr -d '\r\n')"
          USER="$(printf "%s" "${{ secrets.TOPTRY_PROD_USER }}" | tr -d '\r\n')"
          PORT="$(printf "%s" "${{ secrets.TOPTRY_PROD_PORT }}" | tr -d '\r\n')"

          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.TOPTRY_PROD_SSH_KEY }}" > ~/.ssh/id_ed25519
          echo >> ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${PORT}" -H "${HOST}" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_ed25519 -p "${PORT}" "${USER}@${HOST}" bash -lc "set -e
            echo '${{ secrets.GHCR_TOKEN }}' | sudo -n /usr/bin/docker login ghcr.io -u '${{ secrets.GHCR_USER }}' --password-stdin

            # --- API ---
            sudo -n /usr/bin/docker pull ${IMAGE_API}:${TAG}
            sudo -n /usr/bin/docker rm -f ${API_CONTAINER} >/dev/null 2>&1 || true
            sudo -n /usr/bin/docker run -d \
              --name ${API_CONTAINER} \
              --restart unless-stopped \
              --network toptry-ai_default \
              --network-alias ${API_ALIAS} \
              --env-file ${API_ENV_FILE} \
              -p ${API_PORT_BIND} \
              ${IMAGE_API}:${TAG}

            # --- WEB ---
            sudo -n /usr/bin/docker pull ${IMAGE_WEB}:${TAG}
            sudo -n /usr/bin/docker rm -f ${WEB_CONTAINER} >/dev/null 2>&1 || true
            sudo -n /usr/bin/docker run -d \
              --name ${WEB_CONTAINER} \
              --restart unless-stopped \
              --network toptry-ai_default \
              -p ${WEB_PORT_BIND} \
              ${IMAGE_WEB}:${TAG}
          "
