name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'prisma/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-prod
  cancel-in-progress: true

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          HOST="$(printf "%s" "${{ secrets.SSH_HOST }}" | tr -d '\r\n')"
          PORT="$(printf "%s" "${{ secrets.SSH_PORT }}" | tr -d '\r\n')"

          if [ -z "$PORT" ]; then
            PORT="22"
          fi

          mkdir -p ~/.ssh

          printf "%s" "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          echo >> ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts

      - name: Deploy backend on server
        shell: bash
        run: |
          set -euo pipefail

          HOST="$(printf "%s" "${{ secrets.SSH_HOST }}" | tr -d '\r\n')"
          USER="$(printf "%s" "${{ secrets.SSH_USER }}" | tr -d '\r\n')"
          PORT="$(printf "%s" "${{ secrets.SSH_PORT }}" | tr -d '\r\n')"

          if [ -z "$PORT" ]; then
            PORT="22"
          fi

          ssh -i ~/.ssh/id_ed25519 -p "$PORT" "$USER@$HOST" bash -s <<'REMOTE'
          set -euo pipefail

          cd /opt/toptry_true

          git fetch origin main
          git checkout main
          git reset --hard origin/main

          echo "Deploying commit:"
          git log -1 --oneline

          ENV_FILE="/root/toptry-runtime.env"
          if [ ! -f "$ENV_FILE" ]; then
            ENV_FILE="/root/toptry-ai-prod.env"
          fi

          if [ ! -f "$ENV_FILE" ]; then
            echo "ERROR: env file not found" >&2
            exit 1
          fi

          docker compose -f docker-compose.timeweb.yml --env-file "$ENV_FILE" build backend
          docker compose -f docker-compose.timeweb.yml --env-file "$ENV_FILE" up -d backend

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/api/health >/dev/null; then
              echo "Backend healthcheck OK"
              curl -sS http://127.0.0.1:8080/api/health
              echo
              exit 0
            fi

            echo "Waiting for backend healthcheck... $i"
            sleep 2
          done

          echo "ERROR: backend healthcheck failed" >&2
          docker logs --tail 200 toptry-ai-prod || true
          exit 1
          REMOTE
